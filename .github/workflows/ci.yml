name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  go:
    name: Go Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scryve
          POSTGRES_PASSWORD: scryve_test
          POSTGRES_DB: scryve_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scryve"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: make build

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: make test
        env:
          DATABASE_URL: postgres://scryve:scryve_test@localhost:5432/scryve_test?sslmode=disable
          SCRYVE_DB_URL: postgres://scryve:scryve_test@localhost:5432/scryve_test?sslmode=disable
          SCRYVE_REDIS_URL: redis://localhost:6379/0

  web:
    name: Next.js Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npx next build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8080
